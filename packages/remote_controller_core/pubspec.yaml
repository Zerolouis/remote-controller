name: remote_controller_core
description: Native Windows core and Dart FFI facade for Remote Controller.
version: 0.4.0
repository: https://github.com/Zerolouis/remote-controller

environment:
  sdk: ^3.12.2

# Add regular dependencies here.
dependencies:
  archive: ^4.0.9
  code_assets: ^1.2.1
  crypto: ^3.0.7
  ffi: ^2.2.0
  hooks: ^2.0.2
  # 0.19.3 requires meta 1.19, while Flutter 3.44.7 pins meta 1.18.
  native_toolchain_c: ">=0.19.2 <0.19.3"
  record_use: ^0.6.0

dev_dependencies:
  ffigen: ^20.1.1
  lints: ^6.1.0
  test: ^1.31.2
